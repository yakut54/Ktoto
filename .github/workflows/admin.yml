name: Admin CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/admin.yml'
      - 'docker/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/admin/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/admin

jobs:
  # ---- Type Check ----
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @ktoto/admin type-check

  # ---- Build & Push Docker Image ----
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [type-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Deploy to VPS ----
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://admin.yakut54.ru
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ktoto/docker

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u yakut54 --password-stdin || true

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull admin
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d admin

            # Health check
            for i in $(seq 1 10); do
              curl -sf http://127.0.0.1:3001/ && echo "Admin deploy successful ✓" && exit 0
              echo "Waiting... ($i/10)"
              sleep 3
            done
            echo "Health check failed"
            docker logs ktoto_admin --tail 20
            exit 1

      - name: Notify success
        if: success()
        run: echo "::notice::Admin deployed successfully to https://admin.yakut54.ru"

      - name: Notify failure
        if: failure()
        run: echo "::error::Admin deployment failed"
