services:
  backend:
    image: ghcr.io/yakut54/ktoto/backend:${IMAGE_TAG:-latest}
    container_name: ktoto_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ktoto_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    container_name: ktoto_db
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ktoto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ktoto_net

  redis:
    image: redis:7-alpine
    container_name: ktoto_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - ktoto_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ktoto_net

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ktoto_ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: http://31.128.39.216:2586
      NTFY_LISTEN_HTTP: ":80"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ktoto_ntfy_cache:/var/cache/ntfy
      - ktoto_ntfy_data:/var/lib/ntfy
    ports:
      - "2586:80"
    networks:
      - ktoto_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ktoto_pgdata:
  ktoto_redis:
  ktoto_ntfy_cache:
  ktoto_ntfy_data:

networks:
  ktoto_net:
    driver: bridge
