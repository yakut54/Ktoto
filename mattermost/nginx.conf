# /etc/nginx/sites-available/chat.yakut54.ru
# Симлинк: ln -s /etc/nginx/sites-available/chat.yakut54.ru /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name chat.yakut54.ru;

    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name chat.yakut54.ru;

    ssl_certificate     /etc/letsencrypt/live/chat.yakut54.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.yakut54.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Увеличиваем для загрузки файлов (50MB)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8065;
        proxy_http_version 1.1;

        # WebSocket поддержка (нужна для real-time)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90s;
        proxy_buffering off;
    }
}
